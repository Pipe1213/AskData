services:
  postgres:
    image: postgres:16
    container_name: askdata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pagila
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - askdata_postgres_data:/var/lib/postgresql/data
      - ./demo_data/seed/pagila.sql:/docker-entrypoint-initdb.d/01-pagila.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pagila"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  askdata_postgres_data:
